name: dKH 데이터 갱신

on:
  push:
    branches: [master]
    paths:
      - "data/dkh.dat"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: plot-dkh
  cancel-in-progress: false

jobs:
  plot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 최신값·시리즈 JSON 생성
        run: |
          # 최근 2주(하루 3회 기준 42건) — dkh.dat에 날짜가 없어 "회수"로 근사
          python3 bin/make_dkh_json.py data/dkh.dat --json docs/dkh_latest.json --series-json docs/dkh_series.json --recent 42

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dkh_latest.json docs/dkh_series.json
          git diff --cached --quiet || git commit -m "chore: dKH 최신값 자동 갱신"
          git push
