name: dKH 데이터 갱신

on:
  push:
    branches: [master]
    paths:
      - "data/dkh.dat"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: plot-dkh
  cancel-in-progress: false

jobs:
  plot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 날짜 복원(--dates-from-git)이 blame으로 전체 이력을 본다

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 최신값·시리즈 JSON 생성
        run: |
          # 최근 2주(하루 3회 기준 42건) — 날짜는 각 행의 동기화 커밋 시각으로 복원
          python3 bin/make_dkh_json.py data/dkh.dat --json docs/dkh_latest.json --series-json docs/dkh_series.json --recent 42 --dates-from-git

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dkh_latest.json docs/dkh_series.json
          git diff --cached --quiet || git commit -m "chore: dKH 최신값 자동 갱신"
          git push
