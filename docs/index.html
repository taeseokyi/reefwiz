<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AquaWiz — dKH 대시보드</title>
<meta name="description" content="산호 수조 dKH 자동 측정 결과 대시보드">
<meta name="theme-color" content="#0d5a66">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="vendor/chart.umd.min.js"></script>
<style>
  :root {
    --teal: #0d5a66;
    --teal-dark: #093f48;
    --teal-light: #12808f;
    --bg: #f2f7f7;
    --card: #ffffff;
    --ink: #16323a;
    --muted: #6b8790;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 2.5rem;
  }
  header.hero {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    color: #fff;
    padding: 2.2rem 1.25rem 2.6rem;
    text-align: center;
    border-radius: 0 0 28px 28px;
  }
  header.hero img.logo {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  }
  header.hero h1 { margin: 0.6rem 0 0.2rem; font-size: 1.6rem; letter-spacing: -0.02em; }
  header.hero p.tagline { margin: 0; opacity: 0.9; font-size: 0.92rem; }

  main {
    max-width: 640px;
    margin: -1.6rem auto 0;
    padding: 0 1rem;
  }

  section.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
    margin-bottom: 0.9rem;
  }
  .stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 0.9rem 0.5rem;
    text-align: center;
    box-shadow: 0 6px 18px rgba(13, 90, 102, 0.12);
  }
  .stat-card .label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; }
  .stat-card .value { display: block; font-size: 1.25rem; font-weight: 700; color: var(--teal-dark); }
  .stat-card .value.not-flat { color: var(--danger); }

  p.updated {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    margin: 0 0 1.1rem;
  }

  section.graph-card {
    background: var(--card);
    border-radius: 18px;
    padding: 0.9rem 0.7rem;
    box-shadow: 0 6px 18px rgba(13, 90, 102, 0.12);
    margin-bottom: 1.2rem;
  }
  section.graph-card img.graph {
    width: 100%;
    height: auto;
    border-radius: 10px;
    display: block;
  }
  .chart-wrap {
    position: relative;
    height: 270px;
  }
  p.chart-caption {
    text-align: center;
    color: var(--muted);
    font-size: 0.74rem;
    margin: 0.5rem 0;
  }
  h2.card-title {
    font-size: 1rem;
    margin: 0.1rem 0 0.4rem;
    color: var(--teal-dark);
  }

  nav.doc-links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }
  nav.doc-links a {
    background: var(--card);
    color: var(--teal-dark);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 0.85rem 0.9rem;
    border-radius: 14px;
    box-shadow: 0 4px 12px rgba(13, 90, 102, 0.08);
    display: flex;
    align-items: center;
  }
  nav.doc-links a:active { transform: scale(0.98); }

  footer {
    text-align: center;
    margin-top: 1.6rem;
    font-size: 0.8rem;
  }
  footer a { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>
  <header class="hero">
    <img class="logo" src="icons/icon-192.png" alt="">
    <h1>AquaWiz</h1>
    <p class="tagline">산호 수조 dKH 자동 측정 대시보드</p>
  </header>

  <main>
    <section class="stats">
      <div class="stat-card"><span class="label">수조 dKH</span><span class="value" id="tankKh">–</span></div>
      <div class="stat-card"><span class="label">기준(ref)</span><span class="value" id="refKh">–</span></div>
      <div class="stat-card"><span class="label">온도</span><span class="value" id="temp">–</span></div>
    </section>
    <p class="updated" id="updated">최신값 불러오는 중…</p>

    <section class="graph-card">
      <div class="chart-wrap">
        <canvas id="dkhChart"></canvas>
      </div>
      <p class="chart-caption">그래프를 눌러보거나 손가락으로 짚으면 각 지점의 값이 보입니다</p>
      <noscript><img class="graph" src="images/dkh_trend_mobile.png" alt="dKH 추세 그래프"></noscript>
    </section>

    <section class="graph-card">
      <h2 class="card-title">🔬 최근 측정 과정 (평탄 추종)</h2>
      <p class="chart-caption" id="plateauMeta">불러오는 중…</p>
      <div class="chart-wrap" id="plateauWrap">
        <canvas id="plateauChart"></canvas>
      </div>
    </section>

    <nav class="doc-links">
      <a href="measurement-ledger.html">📒 측정 대장</a>
      <a href="user-manual.html">📘 사용 설명서</a>
      <a href="system-setup.html">🛠️ 자동화 구성</a>
      <a href="parts-list.html">🧰 준비물 목록</a>
      <a href="reefcore-integration.html">🔗 reefCore 연동</a>
      <a href="bt-reconnect-and-testing.html">📶 블루투스 재연결</a>
      <a href="notes/">🧪 연구 노트</a>
      <a href="https://github.com/taeseokyi/reefwiz">💻 GitHub 저장소</a>
    </nav>
  </main>

  <footer>
    <a href="https://github.com/taeseokyi/reefwiz">github.com/taeseokyi/reefwiz</a>
  </footer>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }

  fetch("dkh_latest.json", { cache: "no-store" })
    .then((r) => r.json())
    .then((d) => {
      document.getElementById("tankKh").textContent = d.tank_kh.toFixed(3);
      document.getElementById("refKh").textContent = d.ref_kh.toFixed(3);
      document.getElementById("temp").textContent = d.temp.toFixed(1) + "°C";
      const tankEl = document.getElementById("tankKh");
      if (!d.is_flat) tankEl.classList.add("not-flat");
      document.getElementById("updated").textContent =
        "최근 측정 " + d.hh + "시" + (d.is_flat ? "" : " · 평탄 미도달");
    })
    .catch(() => {
      document.getElementById("updated").textContent = "최신값을 불러오지 못했습니다";
    });

  fetch("dkh_series.json", { cache: "no-store" })
    .then((r) => r.json())
    .then((series) => {
      const labels = series.map((p) => p.hh);
      const pointColors = series.map((p) => (p.is_flat ? "#12808f" : "#c0392b"));
      const ctx = document.getElementById("dkhChart");
      new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "수조 dKH",
              data: series.map((p) => p.tank_kh),
              borderColor: "#12808f",
              backgroundColor: "#12808f",
              pointBackgroundColor: pointColors,
              pointBorderColor: pointColors,
              pointRadius: 3,
              pointHoverRadius: 5,
              tension: 0.15,
              yAxisID: "y",
            },
            {
              label: "기준(ref) dKH",
              data: series.map((p) => p.ref_kh),
              borderColor: "#94a3a8",
              borderDash: [5, 4],
              pointRadius: 0,
              tension: 0,
              yAxisID: "y",
            },
            {
              label: "온도(°C)",
              data: series.map((p) => p.temp),
              borderColor: "#e08a2c",
              borderDash: [2, 3],
              pointRadius: 0,
              tension: 0.15,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "bottom", labels: { boxHeight: 6, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                title: (items) => "최근 측정 " + series[items[0].dataIndex].hh + "시",
                label: (item) => {
                  const p = series[item.dataIndex];
                  if (item.dataset.label === "수조 dKH") {
                    return "수조 dKH: " + p.tank_kh.toFixed(3) + (p.is_flat ? "" : " (평탄 미도달)");
                  }
                  if (item.dataset.label === "기준(ref) dKH") return "기준(ref): " + p.ref_kh.toFixed(3);
                  return "온도: " + p.temp.toFixed(1) + "°C";
                },
              },
            },
          },
          scales: {
            x: { ticks: { maxTicksLimit: 8, font: { size: 10 } } },
            y: { position: "left", title: { display: true, text: "dKH" } },
            y1: {
              position: "right",
              title: { display: true, text: "온도(°C)" },
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    })
    .catch(() => {});

  fetch("dkh_plateau.json", { cache: "no-store" })
    .then((r) => r.json())
    .then((d) => {
      const metaEl = document.getElementById("plateauMeta");
      if (!d.tank.length && !d.ref.length) {
        metaEl.textContent = "표시할 측정 과정 데이터가 없습니다";
        document.getElementById("plateauWrap").style.display = "none";
        return;
      }
      const fmtFlat = (arr, flatN) =>
        flatN ? flatN + "회(" + arr.find((p) => p.n === flatN).elapsed + "s)" : "미도달";
      metaEl.textContent =
        d.run_started + " · " + (d.mode === "calref" ? "calref" : "calkh") +
        " · tank " + fmtFlat(d.tank, d.tank_flat_n) +
        " / ref " + fmtFlat(d.ref, d.ref_flat_n) + " 평탄 도달";

      const mkPointColors = (arr, flatN, baseColor) =>
        arr.map((p) => (p.n === flatN ? "#1f9e4d" : baseColor));
      const mkPointRadius = (arr, flatN) =>
        arr.map((p) => (p.n === flatN ? 6 : 2.5));

      new Chart(document.getElementById("plateauChart"), {
        type: "line",
        data: {
          datasets: [
            {
              label: "tank",
              data: d.tank.map((p) => ({ x: p.elapsed, y: p.ph, n: p.n })),
              borderColor: "#12808f",
              backgroundColor: "#12808f",
              pointBackgroundColor: mkPointColors(d.tank, d.tank_flat_n, "#12808f"),
              pointRadius: mkPointRadius(d.tank, d.tank_flat_n),
              pointHoverRadius: 7,
              tension: 0.2,
            },
            {
              label: "ref",
              data: d.ref.map((p) => ({ x: p.elapsed, y: p.ph, n: p.n })),
              borderColor: "#7a5ea8",
              backgroundColor: "#7a5ea8",
              pointBackgroundColor: mkPointColors(d.ref, d.ref_flat_n, "#7a5ea8"),
              pointRadius: mkPointRadius(d.ref, d.ref_flat_n),
              pointHoverRadius: 7,
              tension: 0.2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "nearest", axis: "x", intersect: false },
          plugins: {
            legend: { position: "bottom", labels: { boxHeight: 6, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                title: (items) => items[0].dataset.label + " " + items[0].raw.n + "회",
                label: (item) => {
                  const flatN = item.dataset.label === "tank" ? d.tank_flat_n : d.ref_flat_n;
                  const flat = item.raw.n === flatN ? " (평탄 판정)" : "";
                  return "pH " + item.raw.y.toFixed(3) + " · " + item.raw.x + "s" + flat;
                },
              },
            },
          },
          scales: {
            x: { type: "linear", title: { display: true, text: "경과 시간(초, 각 phase 시작 기준)" } },
            y: { title: { display: true, text: "pH" } },
          },
        },
      });
    })
    .catch(() => {
      document.getElementById("plateauMeta").textContent = "불러오지 못했습니다";
    });
</script>
</body>
</html>
