<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="12">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr-b-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
    <marker id="arr-r-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#C62828"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arr-o-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-g-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-air" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0288D1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">호스 연결도 (모든 펌프 양방향)</text>
  <line x1="120" y1="38" x2="740" y2="38" stroke="#ccc" stroke-width="1"/>

  <!-- Section -->
  <text x="50" y="65" font-size="14" font-weight="bold" fill="#455A64">액체 호스 (연동 펌프 4구, 양방향)</text>

  <!-- ===== pH 측정 비이커 (공통 목적지, 크게 배치) ===== -->
  <rect x="640" y="80" width="160" height="240" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="2.5"/>
  <text x="720" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">pH 측정</text>
  <text x="720" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">비이커</text>
  <text x="720" y="140" text-anchor="middle" font-size="11" fill="#666">200ml</text>
  <text x="720" y="156" text-anchor="middle" font-size="11" fill="#666">+ pH 프로브</text>

  <!-- M2 진입점 표시 (상단) -->
  <rect x="643" y="175" width="50" height="16" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="668" y="186" text-anchor="middle" font-size="9" fill="#C62828">M2 연결</text>

  <!-- M3 진입점 표시 (중단) -->
  <rect x="643" y="255" width="50" height="16" rx="3" fill="#E65100" opacity="0.15"/>
  <text x="668" y="266" text-anchor="middle" font-size="9" fill="#E65100">M3 연결</text>

  <!-- M4 진입점 표시 (하단) -->
  <rect x="643" y="295" width="50" height="16" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="668" y="306" text-anchor="middle" font-size="9" fill="#2E7D32">M4 연결</text>

  <!-- ===== M1: 수조 ↔ 수조물 비이커 ===== -->
  <rect x="50" y="85" width="120" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="110" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">수조</text>

  <rect x="320" y="85" width="130" height="50" rx="8" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="385" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">수조물 비이커</text>
  <text x="385" y="125" text-anchor="middle" font-size="10" fill="#666">200ml</text>

  <!-- M1 forward -->
  <line x1="170" y1="103" x2="223" y2="103" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <line x1="267" y1="103" x2="318" y2="103" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <!-- M1 backward -->
  <line x1="223" y1="117" x2="170" y2="117" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-b)"/>
  <line x1="318" y1="117" x2="267" y2="117" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-b)"/>

  <!-- M1 원 (라인 위에 그려짐) -->
  <circle cx="245" cy="110" r="22" fill="#1565C0" stroke="white" stroke-width="2"/>
  <text x="245" y="116" text-anchor="middle" font-size="14" fill="white" font-weight="bold">M1</text>

  <text x="245" y="148" text-anchor="middle" font-size="10" fill="#1565C0">펌프1 (양방향)</text>
  <text x="197" y="88" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">f: 샘플링</text>
  <text x="197" y="135" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">b: 반환</text>

  <!-- ===== M2: 수조물 비이커 ↔ pH 비이커 (상단 진입) ===== -->

  <!-- M2 forward: 수조물 → M2 → pH (y=178) -->
  <path d="M450,100 L480,100 Q500,100 500,130 L500,178 L518,178" fill="none" stroke="#C62828" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <path d="M562,178 L638,178" fill="none" stroke="#C62828" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <!-- M2 backward -->
  <path d="M638,190 L562,190" fill="none" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>
  <path d="M518,190 L510,190 Q510,145 510,115 L460,115 L450,115" fill="none" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>

  <!-- M2 원 (라인 위에 그려짐) -->
  <circle cx="540" cy="183" r="22" fill="#C62828" stroke="white" stroke-width="2"/>
  <text x="540" y="189" text-anchor="middle" font-size="14" fill="white" font-weight="bold">M2</text>
  <text x="540" y="160" text-anchor="middle" font-size="10" fill="#C62828">펌프2 (양방향)</text>

  <text x="605" y="172" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">f: 측정 이송</text>
  <text x="605" y="198" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">b: 반환</text>

  <!-- ===== M3: KCL ↔ pH 비이커 (중단 진입) ===== -->
  <rect x="50" y="255" width="120" height="50" rx="8" fill="#FFF8E1" stroke="#E65100" stroke-width="2"/>
  <text x="110" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">3M KCl 비이커</text>
  <text x="110" y="295" text-anchor="middle" font-size="10" fill="#666">200ml (저장수)</text>

  <!-- M3 forward -->
  <line x1="170" y1="263" x2="223" y2="263" stroke="#E65100" stroke-width="2.5" marker-end="url(#arr-o)"/>
  <path d="M267,263 L638,263" fill="none" stroke="#E65100" stroke-width="2.5" marker-end="url(#arr-o)"/>
  <!-- M3 backward -->
  <line x1="223" y1="277" x2="170" y2="277" stroke="#E65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <path d="M638,273 L267,273" fill="none" stroke="#E65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>

  <!-- M3 원 (라인 위에 그려짐) -->
  <circle cx="245" cy="270" r="22" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="245" y="276" text-anchor="middle" font-size="14" fill="white" font-weight="bold">M3</text>
  <text x="245" y="308" text-anchor="middle" font-size="10" fill="#E65100">펌프3 (양방향)</text>

  <text x="400" y="253" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">f: KCL 공급 (프로브 보관)</text>
  <text x="400" y="288" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">b: KCL 배출 (측정 전)</text>

  <!-- ===== M4: 위즈 탱크 ↔ pH 비이커 (하단 진입) ===== -->
  <rect x="50" y="350" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="110" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">위즈 탱크</text>
  <text x="110" y="390" text-anchor="middle" font-size="10" fill="#666">참조 해수 5L</text>

  <!-- M4 forward -->
  <line x1="170" y1="368" x2="223" y2="368" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <path d="M267,368 L620,368 Q638,368 638,340 L638,310" fill="none" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <!-- M4 backward -->
  <line x1="223" y1="382" x2="170" y2="382" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>
  <path d="M650,310 L650,360 Q650,378 638,378 L267,378" fill="none" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>

  <!-- M4 원 (라인 위에 그려짐) -->
  <circle cx="245" cy="375" r="22" fill="#2E7D32" stroke="white" stroke-width="2"/>
  <text x="245" y="381" text-anchor="middle" font-size="14" fill="white" font-weight="bold">M4</text>
  <text x="245" y="413" text-anchor="middle" font-size="10" fill="#2E7D32">펌프4 (양방향)</text>

  <text x="440" y="360" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">f: 참조수 이송 (측정)</text>
  <text x="440" y="395" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">b: 참조수 반환</text>

  <!-- Separator -->
  <line x1="30" y1="430" x2="830" y2="430" stroke="#ccc" stroke-width="1"/>

  <!-- Section: 에어 호스 (3-way 솔레노이드 직렬 연결) -->
  <text x="50" y="460" font-size="14" font-weight="bold" fill="#455A64">에어 호스 (3-way 솔레노이드 밸브 직렬 연결)</text>

  <!-- 기포기 -->
  <rect x="50" y="475" width="105" height="45" rx="8" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="102" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#0288D1">기포기</text>

  <!-- 기포기 → SOL1 -->
  <line x1="155" y1="490" x2="233" y2="490" stroke="#0288D1" stroke-width="2" marker-end="url(#arr-air)"/>

  <!-- SOL1 -->
  <rect x="235" y="477" width="70" height="26" rx="6" fill="#0288D1"/>
  <text x="270" y="494" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SOL1</text>
  <text x="248" y="516" text-anchor="middle" font-size="9" fill="#0288D1">D12</text>

  <!-- SOL1 ON → pH 측정 비이커 -->
  <line x1="305" y1="484" x2="423" y2="484" stroke="#0288D1" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-air)"/>
  <text x="364" y="478" text-anchor="middle" font-size="9" fill="#0288D1" font-weight="bold">ON</text>

  <rect x="425" y="472" width="130" height="26" rx="6" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
  <text x="490" y="489" text-anchor="middle" font-size="11" fill="#C62828">pH 측정 비이커</text>
  <text x="490" y="508" text-anchor="middle" font-size="9" fill="#C62828">Air1 (참조수 탈기)</text>

  <!-- SOL1 OFF → SOL2 (직렬 연결) -->
  <line x1="270" y1="503" x2="270" y2="530" stroke="#0288D1" stroke-width="2" marker-end="url(#arr-air)"/>
  <text x="285" y="520" font-size="9" fill="#0288D1" font-weight="bold">OFF</text>

  <!-- SOL2 -->
  <rect x="235" y="532" width="70" height="26" rx="6" fill="#0288D1"/>
  <text x="270" y="549" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SOL2</text>
  <text x="270" y="570" text-anchor="middle" font-size="9" fill="#0288D1">D13</text>

  <!-- SOL2 ON → 수조물 비이커 -->
  <line x1="305" y1="540" x2="423" y2="540" stroke="#0288D1" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-air)"/>
  <text x="364" y="534" text-anchor="middle" font-size="9" fill="#0288D1" font-weight="bold">ON</text>

  <rect x="425" y="527" width="130" height="26" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="490" y="544" text-anchor="middle" font-size="11" fill="#1565C0">수조물 비이커</text>
  <text x="490" y="563" text-anchor="middle" font-size="9" fill="#1565C0">Air2 (수조수 탈기)</text>

  <!-- 설명 박스 -->
  <rect x="580" y="472" width="235" height="70" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="697" y="490" text-anchor="middle" font-size="10" fill="#795548">3-way 솔레노이드 직렬 연결</text>
  <text x="697" y="505" text-anchor="middle" font-size="10" fill="#795548">SOL1 ON → pH 비이커 (참조수 폭기)</text>
  <text x="697" y="520" text-anchor="middle" font-size="10" fill="#795548">SOL1 OFF → SOL2 ON → 수조물 비이커</text>
  <text x="697" y="535" text-anchor="middle" font-size="10" fill="#795548">(5초 주기 교대 공급)</text>

  <!-- Legend -->
  <line x1="640" y1="390" x2="670" y2="390" stroke="#666" stroke-width="2.5"/>
  <text x="678" y="394" font-size="9" fill="#666">실선 = 정방향 (f)</text>
  <line x1="640" y1="405" x2="670" y2="405" stroke="#666" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="678" y="409" font-size="9" fill="#666">점선 = 역방향 (b)</text>
</svg>
