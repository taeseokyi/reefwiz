<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="12">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr-b-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
    <marker id="arr-r-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#C62828"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arr-o-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-g-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-air" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0288D1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">배관 연결도 (모든 펌프 양방향)</text>
  <line x1="100" y1="38" x2="700" y2="38" stroke="#ccc" stroke-width="1"/>

  <!-- Section: 액체 배관 -->
  <text x="50" y="70" font-size="14" font-weight="bold" fill="#455A64">액체 배관 (연동 펌프 4구, 양방향)</text>

  <!-- ===== Line 1: 수조 ↔ M1 ↔ 수조물 비이커 ===== -->

  <!-- 수조 -->
  <rect x="50" y="90" width="120" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="110" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">수조</text>

  <!-- Pump 1 -->
  <circle cx="255" cy="115" r="18" fill="#1565C0"/>
  <text x="255" y="112" text-anchor="middle" font-size="10" fill="white" font-weight="bold">M1</text>
  <text x="255" y="125" text-anchor="middle" font-size="8" fill="white">양방향</text>
  <text x="255" y="150" text-anchor="middle" font-size="10" fill="#1565C0">펌프1</text>

  <!-- 수조물 비이커 -->
  <rect x="330" y="90" width="130" height="50" rx="8" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="395" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">수조물 비이커</text>
  <text x="395" y="130" text-anchor="middle" font-size="10" fill="#666">200ml</text>

  <!-- Bidirectional lines: 수조 ↔ M1 ↔ 수조물 -->
  <line x1="170" y1="108" x2="235" y2="108" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="235" y1="122" x2="170" y2="122" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-b-rev)"/>
  <line x1="275" y1="108" x2="328" y2="108" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="328" y1="122" x2="275" y2="122" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-b-rev)"/>

  <!-- Labels -->
  <rect x="168" y="93" width="64" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="200" y="103" text-anchor="middle" font-size="8" fill="#1565C0" font-weight="bold">f: 샘플링</text>
  <rect x="175" y="127" width="50" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="200" y="137" text-anchor="middle" font-size="8" fill="#1565C0" font-weight="bold">b: 반환</text>

  <!-- ===== Line 1 continued: ↔ M2 ↔ pH 비이커 ===== -->

  <!-- Pump 2 -->
  <circle cx="545" cy="115" r="18" fill="#C62828"/>
  <text x="545" y="112" text-anchor="middle" font-size="10" fill="white" font-weight="bold">M2</text>
  <text x="545" y="125" text-anchor="middle" font-size="8" fill="white">양방향</text>
  <text x="545" y="150" text-anchor="middle" font-size="10" fill="#C62828">펌프2</text>

  <!-- pH 측정 비이커 -->
  <rect x="620" y="90" width="140" height="50" rx="8" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>
  <text x="690" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">pH 측정 비이커</text>
  <text x="690" y="130" text-anchor="middle" font-size="10" fill="#666">200ml + pH 프로브</text>

  <!-- Bidirectional lines: 수조물 ↔ M2 ↔ pH -->
  <line x1="460" y1="108" x2="525" y2="108" stroke="#C62828" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="525" y1="122" x2="460" y2="122" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-r-rev)"/>
  <line x1="565" y1="108" x2="618" y2="108" stroke="#C62828" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="618" y1="122" x2="565" y2="122" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-r-rev)"/>

  <!-- Labels -->
  <rect x="455" y="93" width="70" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="490" y="103" text-anchor="middle" font-size="8" fill="#C62828" font-weight="bold">f: 측정 이송</text>
  <rect x="465" y="127" width="50" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="490" y="137" text-anchor="middle" font-size="8" fill="#C62828" font-weight="bold">b: 반환</text>

  <!-- ===== Line 2: KCL ↔ M3 ↔ pH 비이커 ===== -->

  <!-- KCL 비이커 -->
  <rect x="50" y="195" width="120" height="50" rx="8" fill="#FFF8E1" stroke="#E65100" stroke-width="2"/>
  <text x="110" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">KCL 3% 비이커</text>
  <text x="110" y="235" text-anchor="middle" font-size="10" fill="#666">200ml (저장수)</text>

  <!-- Pump 3 -->
  <circle cx="255" cy="220" r="18" fill="#E65100"/>
  <text x="255" y="217" text-anchor="middle" font-size="10" fill="white" font-weight="bold">M3</text>
  <text x="255" y="230" text-anchor="middle" font-size="8" fill="white">양방향</text>
  <text x="255" y="255" text-anchor="middle" font-size="10" fill="#E65100">펌프3</text>

  <!-- Bidirectional lines: KCL ↔ M3 -->
  <line x1="170" y1="213" x2="235" y2="213" stroke="#E65100" stroke-width="2" marker-end="url(#arr-o)"/>
  <line x1="235" y1="227" x2="170" y2="227" stroke="#E65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-o-rev)"/>

  <!-- Bidirectional line: M3 ↔ pH 비이커 (curved) -->
  <path d="M275,213 L510,213 Q565,213 565,175 L565,108 L618,108" fill="none" stroke="#E65100" stroke-width="2" marker-end="url(#arr-o)"/>
  <path d="M618,122 L575,122 Q575,180 575,223 L275,223" fill="none" stroke="#E65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-o-rev)"/>

  <!-- Labels -->
  <rect x="330" y="198" width="140" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="400" y="208" text-anchor="middle" font-size="8" fill="#E65100" font-weight="bold">f: KCL 공급 (프로브 보관)</text>
  <rect x="335" y="230" width="130" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="400" y="240" text-anchor="middle" font-size="8" fill="#E65100" font-weight="bold">b: KCL 배출 (측정 전)</text>

  <!-- ===== Line 3: 위즈 탱크 ↔ M4 ↔ pH 비이커 ===== -->

  <!-- 위즈 탱크 -->
  <rect x="50" y="290" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="110" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">위즈 탱크</text>
  <text x="110" y="328" text-anchor="middle" font-size="10" fill="#666">참조 해수 3L</text>

  <!-- Pump 4 -->
  <circle cx="255" cy="315" r="18" fill="#2E7D32"/>
  <text x="255" y="312" text-anchor="middle" font-size="10" fill="white" font-weight="bold">M4</text>
  <text x="255" y="325" text-anchor="middle" font-size="8" fill="white">양방향</text>
  <text x="255" y="350" text-anchor="middle" font-size="10" fill="#2E7D32">펌프4</text>

  <!-- Bidirectional lines: 위즈 탱크 ↔ M4 -->
  <line x1="170" y1="308" x2="235" y2="308" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="235" y1="322" x2="170" y2="322" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-g-rev)"/>

  <!-- Bidirectional line: M4 ↔ pH 비이커 (curved) -->
  <path d="M275,308 L530,308 Q590,308 590,258 L590,108 L618,108" fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-g)"/>
  <path d="M618,122 L600,122 Q600,270 600,318 L275,318" fill="none" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-g-rev)"/>

  <!-- Labels -->
  <rect x="335" y="293" width="130" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="400" y="303" text-anchor="middle" font-size="8" fill="#2E7D32" font-weight="bold">f: 참조수 이송 (측정)</text>
  <rect x="350" y="325" width="100" height="12" rx="2" fill="white" opacity="0.9"/>
  <text x="400" y="335" text-anchor="middle" font-size="8" fill="#2E7D32" font-weight="bold">b: 참조수 반환</text>

  <!-- Separator -->
  <line x1="30" y1="375" x2="770" y2="375" stroke="#ccc" stroke-width="1"/>

  <!-- Section: 에어 배관 -->
  <text x="50" y="405" font-size="14" font-weight="bold" fill="#455A64">에어 배관 (솔레노이드 밸브)</text>

  <!-- 기포기 -->
  <rect x="50" y="420" width="120" height="50" rx="8" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="110" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#0288D1">기포기</text>

  <!-- SOL1 -->
  <rect x="240" y="418" width="70" height="26" rx="6" fill="#0288D1"/>
  <text x="275" y="435" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SOL1</text>
  <text x="275" y="460" text-anchor="middle" font-size="9" fill="#0288D1">D12</text>

  <!-- 기포기 → SOL1 -->
  <path d="M170,435 L200,435 L200,431 L238,431" fill="none" stroke="#0288D1" stroke-width="2" marker-end="url(#arr-air)"/>

  <!-- pH 측정 비이커 (air target) -->
  <rect x="410" y="418" width="130" height="26" rx="6" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
  <text x="475" y="435" text-anchor="middle" font-size="11" fill="#C62828">pH 측정 비이커</text>
  <text x="475" y="460" text-anchor="middle" font-size="9" fill="#C62828">Air1</text>

  <!-- SOL1 → pH 비이커 -->
  <line x1="310" y1="431" x2="408" y2="431" stroke="#0288D1" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-air)"/>

  <!-- SOL2 -->
  <rect x="240" y="470" width="70" height="26" rx="6" fill="#0288D1"/>
  <text x="275" y="487" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SOL2</text>
  <text x="275" y="508" text-anchor="middle" font-size="9" fill="#0288D1">D13</text>

  <!-- 기포기 → SOL2 -->
  <path d="M170,450 L200,450 L200,483 L238,483" fill="none" stroke="#0288D1" stroke-width="2" marker-end="url(#arr-air)"/>

  <!-- 수조물 비이커 (air target) -->
  <rect x="410" y="470" width="130" height="26" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="475" y="487" text-anchor="middle" font-size="11" fill="#1565C0">수조물 비이커</text>
  <text x="475" y="508" text-anchor="middle" font-size="9" fill="#1565C0">Air2</text>

  <!-- SOL2 → 수조물 비이커 -->
  <line x1="310" y1="483" x2="408" y2="483" stroke="#0288D1" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-air)"/>

  <!-- Note -->
  <rect x="570" y="425" width="200" height="55" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="670" y="445" text-anchor="middle" font-size="10" fill="#795548">SOL1/SOL2 동시 개방 불가</text>
  <text x="670" y="460" text-anchor="middle" font-size="10" fill="#795548">기포기 1대 → 교대 공급</text>
  <text x="670" y="475" text-anchor="middle" font-size="10" fill="#795548">(5초 주기 참조/수조 교대)</text>

  <!-- Legend -->
  <rect x="580" y="90" width="10" height="0" rx="0" fill="none"/>
  <!-- solid = forward, dashed = backward -->
  <line x1="580" y1="155" x2="610" y2="155" stroke="#666" stroke-width="2"/>
  <text x="618" y="159" font-size="9" fill="#666">실선 = 정방향 (f)</text>
  <line x1="580" y1="170" x2="610" y2="170" stroke="#666" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="618" y="174" font-size="9" fill="#666">점선 = 역방향 (b)</text>
</svg>
