<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Malgun Gothic', sans-serif" font-size="11">
  <text x="450" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">AquaWiz 하우징 배치도 (상면도)</text>

  <!-- ===== 제어기 하우징 ===== -->
  <rect x="20" y="50" width="180" height="173" rx="5" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="110" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#37474F">제어기 하우징</text>
  <text x="110" y="85" text-anchor="middle" font-size="9" fill="#666">180 x 173 x 45 mm</text>

  <!-- 브레드보드 x2 -->
  <rect x="30" y="95" width="135" height="45" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="97" y="121" text-anchor="middle" font-size="9" fill="#795548">브레드보드 1 (165x55)</text>
  <rect x="30" y="145" width="135" height="45" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="97" y="171" text-anchor="middle" font-size="9" fill="#795548">브레드보드 2 (165x55)</text>

  <!-- 브레드보드 위 부품 -->
  <rect x="35" y="100" width="37" height="15" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="53" y="111" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Nano</text>
  <rect x="77" y="100" width="22" height="15" rx="1" fill="#2196F3" stroke="#1565C0" stroke-width="0.5"/>
  <text x="88" y="111" text-anchor="middle" font-size="7" fill="white" font-weight="bold">ADS</text>
  <rect x="104" y="100" width="22" height="15" rx="1" fill="#9C27B0" stroke="#7B1FA2" stroke-width="0.5"/>
  <text x="115" y="111" text-anchor="middle" font-size="7" fill="white" font-weight="bold">BT</text>

  <!-- L298N x3 -->
  <rect x="30" y="195" width="35" height="22" rx="1" fill="#F44336" stroke="#C62828" stroke-width="1"/>
  <text x="47" y="209" text-anchor="middle" font-size="8" fill="white" font-weight="bold">L298N</text>
  <rect x="70" y="195" width="35" height="22" rx="1" fill="#F44336" stroke="#C62828" stroke-width="1"/>
  <text x="87" y="209" text-anchor="middle" font-size="8" fill="white" font-weight="bold">L298N</text>
  <rect x="110" y="195" width="35" height="22" rx="1" fill="#F44336" stroke="#C62828" stroke-width="1"/>
  <text x="127" y="209" text-anchor="middle" font-size="8" fill="white" font-weight="bold">L298N</text>

  <!-- Buck 컨버터 -->
  <rect x="150" y="195" width="40" height="10" rx="1" fill="#FF9800" stroke="#E65100" stroke-width="0.5"/>
  <text x="170" y="203" text-anchor="middle" font-size="7" fill="white">5V Buck</text>
  <rect x="150" y="208" width="40" height="10" rx="1" fill="#FF9800" stroke="#E65100" stroke-width="0.5"/>
  <text x="170" y="216" text-anchor="middle" font-size="7" fill="white">6V XL4015</text>

  <!-- 통풍구 표시 -->
  <text x="110" y="235" text-anchor="middle" font-size="8" fill="#999">▤▤▤ 통풍구 ▤▤▤</text>

  <!-- 케이블 홀 -->
  <circle cx="20" cy="140" r="4" fill="none" stroke="#455A64" stroke-width="1"/>
  <circle cx="20" cy="170" r="4" fill="none" stroke="#455A64" stroke-width="1"/>
  <circle cx="200" cy="140" r="5" fill="none" stroke="#C62828" stroke-width="1"/>
  <text x="215" y="143" font-size="7" fill="#C62828">DC잭</text>

  <!-- ===== 펌프+분배기 하우징 ===== -->
  <rect x="240" y="50" width="340" height="80" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="410" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">펌프 + 에어 분배기 하우징</text>
  <text x="410" y="85" text-anchor="middle" font-size="9" fill="#666">296 x 53 x 75 mm</text>

  <!-- 펌프 x4 -->
  <rect x="255" y="92" width="45" height="30" rx="2" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <text x="277" y="110" text-anchor="middle" font-size="9" fill="white" font-weight="bold">M1</text>
  <rect x="308" y="92" width="45" height="30" rx="2" fill="#C62828" stroke="#B71C1C" stroke-width="1"/>
  <text x="330" y="110" text-anchor="middle" font-size="9" fill="white" font-weight="bold">M2</text>
  <rect x="361" y="92" width="45" height="30" rx="2" fill="#E65100" stroke="#BF360C" stroke-width="1"/>
  <text x="383" y="110" text-anchor="middle" font-size="9" fill="white" font-weight="bold">M3</text>
  <rect x="414" y="92" width="45" height="30" rx="2" fill="#2E7D32" stroke="#1B5E20" stroke-width="1"/>
  <text x="436" y="110" text-anchor="middle" font-size="9" fill="white" font-weight="bold">M4</text>

  <!-- 구분벽 -->
  <line x1="468" y1="55" x2="468" y2="125" stroke="#2E7D32" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- 솔레노이드 x2 -->
  <rect x="478" y="95" width="18" height="25" rx="1" fill="#0288D1" stroke="#01579B" stroke-width="1"/>
  <text x="487" y="111" text-anchor="middle" font-size="7" fill="white" font-weight="bold">S1</text>
  <rect x="504" y="95" width="18" height="25" rx="1" fill="#0288D1" stroke="#01579B" stroke-width="1"/>
  <text x="513" y="111" text-anchor="middle" font-size="7" fill="white" font-weight="bold">S2</text>

  <!-- 호스 홀 표시 -->
  <text x="330" y="140" text-anchor="middle" font-size="8" fill="#666">○○○○○○○○ 호스 홀 (입출 8개)</text>
  <text x="500" y="140" text-anchor="middle" font-size="8" fill="#0288D1">○○ 에어</text>

  <!-- ===== 위즈 탱크 ===== -->
  <rect x="240" y="180" width="250" height="180" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="365" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">위즈 탱크</text>
  <text x="365" y="215" text-anchor="middle" font-size="9" fill="#666">다이소 락앤락 김치통 (5L)</text>

  <!-- 참조 해수 영역 -->
  <rect x="250" y="270" width="230" height="80" rx="3" fill="#B3E5FC" opacity="0.4"/>
  <text x="365" y="345" text-anchor="middle" font-size="9" fill="#0277BD">참조 해수</text>

  <!-- 비이커 x3 -->
  <rect x="265" y="230" width="55" height="80" rx="3" fill="white" stroke="#1976D2" stroke-width="1.5"/>
  <text x="292" y="260" text-anchor="middle" font-size="9" fill="#1976D2" font-weight="bold">수조물</text>
  <text x="292" y="275" text-anchor="middle" font-size="8" fill="#666">200ml</text>

  <rect x="335" y="230" width="55" height="80" rx="3" fill="white" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="362" y="255" text-anchor="middle" font-size="9" fill="#D32F2F" font-weight="bold">pH 측정</text>
  <text x="362" y="270" text-anchor="middle" font-size="8" fill="#666">200ml</text>
  <text x="362" y="285" text-anchor="middle" font-size="8" fill="#78909C">+프로브</text>

  <rect x="405" y="230" width="55" height="80" rx="3" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="432" y="260" text-anchor="middle" font-size="9" fill="#F9A825" font-weight="bold">KCL 3%</text>
  <text x="432" y="275" text-anchor="middle" font-size="8" fill="#666">200ml</text>

  <!-- DS18B20 -->
  <rect x="470" y="250" width="10" height="40" rx="2" fill="#E65100"/>
  <text x="475" y="300" text-anchor="middle" font-size="7" fill="#E65100">T</text>

  <!-- ===== 호스 연결 표시 ===== -->
  <!-- 제어기 → 펌프 (전선) -->
  <path d="M200,160 L230,160 L230,90 L240,90" fill="none" stroke="#455A64" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="225" y="85" font-size="8" fill="#455A64">전선</text>

  <!-- 펌프 → 위즈 탱크 (호스) -->
  <path d="M330,122 L330,165 L330,230" fill="none" stroke="#1976D2" stroke-width="1.5"/>
  <path d="M383,122 L383,165 L362,230" fill="none" stroke="#D32F2F" stroke-width="1.5"/>
  <path d="M436,122 L436,165 L432,230" fill="none" stroke="#F9A825" stroke-width="1.5"/>
  <path d="M277,122 L277,165 L292,230" fill="none" stroke="#1565C0" stroke-width="1.5"/>

  <!-- 에어 → 비이커 -->
  <path d="M500,120 L500,165 Q500,180 480,180 L362,180 L362,230" fill="none" stroke="#90CAF9" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M510,120 L510,170 Q510,185 490,185 L292,185 L292,230" fill="none" stroke="#90CAF9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 범례 -->
  <rect x="600" y="180" width="250" height="150" rx="5" fill="#FAFAFA" stroke="#CCC" stroke-width="1"/>
  <text x="725" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">범례</text>
  <line x1="615" y1="215" x2="640" y2="215" stroke="#455A64" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="648" y="219" font-size="9" fill="#666">전선 연결</text>
  <line x1="615" y1="235" x2="640" y2="235" stroke="#1976D2" stroke-width="1.5"/>
  <text x="648" y="239" font-size="9" fill="#666">호스 연결</text>
  <line x1="615" y1="255" x2="640" y2="255" stroke="#90CAF9" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="648" y="259" font-size="9" fill="#666">에어 호스</text>
  <circle cx="627" cy="275" r="4" fill="none" stroke="#455A64" stroke-width="1"/>
  <text x="648" y="279" font-size="9" fill="#666">케이블/호스 홀</text>

  <text x="725" y="305" text-anchor="middle" font-size="9" fill="#795548">M1: 수조↔수조물  M2: 수조물↔pH</text>
  <text x="725" y="318" text-anchor="middle" font-size="9" fill="#795548">M3: KCL↔pH  M4: 참조수↔pH</text>
</svg>
