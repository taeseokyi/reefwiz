<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="11">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B3E5FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0288D1" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="kg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F9A825" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="sh" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="420" width="1100" height="300" fill="#EFEBE9"/>
  <rect x="0" y="416" width="1100" height="6" fill="#D7CCC8" rx="2"/>
  <text x="550" y="24" text-anchor="middle" font-size="17" font-weight="bold" fill="#37474F">AquaWiz 시스템 셋팅 구성</text>

  <!-- ===== 수조 ===== -->
  <g filter="url(#sh)">
    <rect x="25" y="195" width="170" height="190" rx="5" fill="#E3F2FD" stroke="#64B5F6" stroke-width="2"/>
    <rect x="32" y="280" width="156" height="98" rx="3" fill="url(#wg)"/>
    <circle cx="60" cy="365" r="9" fill="#FF8A65" opacity="0.5"/>
    <circle cx="85" cy="370" r="7" fill="#AED581" opacity="0.5"/>
    <circle cx="120" cy="362" r="11" fill="#CE93D8" opacity="0.4"/>
    <circle cx="155" cy="368" r="8" fill="#4FC3F7" opacity="0.4"/>
    <rect x="32" y="370" width="156" height="8" rx="2" fill="#FFF3E0" opacity="0.6"/>
  </g>
  <text x="110" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">수조 (리프 탱크)</text>

  <!-- ===== 위즈 탱크 ===== -->
  <g filter="url(#sh)">
    <rect x="290" y="200" width="380" height="230" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2.5"/>
    <rect x="285" y="190" width="390" height="14" rx="5" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1.5"/>
    <rect x="310" y="187" width="18" height="7" rx="2" fill="#43A047"/>
    <rect x="640" y="187" width="18" height="7" rx="2" fill="#43A047"/>
    <rect x="298" y="310" width="364" height="112" rx="4" fill="url(#wg)" opacity="0.4"/>

    <!-- 비이커1: 수조물 -->
    <rect x="315" y="255" width="80" height="120" rx="4" fill="white" stroke="#1976D2" stroke-width="1.5" opacity="0.9"/>
    <rect x="320" y="320" width="70" height="50" rx="2" fill="url(#wg)"/>
    <text x="355" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976D2">수조물</text>
    <text x="355" y="295" text-anchor="middle" font-size="8" fill="#888">200ml</text>

    <!-- 비이커2: pH 측정 -->
    <rect x="420" y="255" width="80" height="120" rx="4" fill="white" stroke="#D32F2F" stroke-width="1.5" opacity="0.9"/>
    <rect x="425" y="320" width="70" height="50" rx="2" fill="url(#wg)"/>
    <text x="460" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F">pH 측정</text>
    <text x="460" y="290" text-anchor="middle" font-size="8" fill="#888">200ml</text>
    <!-- pH 프로브 -->
    <rect x="488" y="268" width="4" height="55" rx="1.5" fill="#607D8B"/>
    <rect x="486" y="320" width="8" height="8" rx="2" fill="#455A64"/>
    <text x="502" y="285" font-size="7" fill="#455A64" font-weight="bold">pH</text>
    <circle cx="442" cy="350" r="2.5" fill="#90CAF9" opacity="0.7"/>
    <circle cx="448" cy="342" r="2" fill="#90CAF9" opacity="0.5"/>

    <!-- 비이커3: KCL -->
    <rect x="530" y="255" width="80" height="120" rx="4" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
    <rect x="535" y="320" width="70" height="50" rx="2" fill="url(#kg)"/>
    <text x="570" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#F9A825">3M KCl</text>
    <text x="570" y="295" text-anchor="middle" font-size="8" fill="#888">200ml</text>

    <!-- DS18B20 -->
    <rect x="625" y="280" width="3" height="40" rx="1" fill="#E65100"/>
    <circle cx="626" cy="323" r="3" fill="#FF6D00"/>
    <text x="638" y="300" font-size="7" fill="#E65100">DS18B20</text>
  </g>
  <text x="480" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">위즈 탱크 (락앤락 김치통 5L)</text>

  <!-- ★밀폐 공통 헤드스페이스 (sealed common headspace) -->
  <rect x="280" y="183" width="400" height="255" rx="12" fill="none" stroke="#8E24AA" stroke-width="2" stroke-dasharray="8,5"/>
  <rect x="378" y="166" width="204" height="20" rx="5" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.2"/>
  <text x="480" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">★밀폐 공통 헤드스페이스 (필수)</text>

  <!-- ===== 기포기(에어 펌프) ×2 — 헤드스페이스 박스 내부 ===== -->
  <!-- 기포기1 (제어기 직결, 우측) -->
  <g filter="url(#sh)">
    <rect x="596" y="212" width="50" height="26" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="1.4"/>
    <circle cx="611" cy="225" r="8" fill="white" stroke="#0288D1" stroke-width="1"/>
    <circle cx="611" cy="225" r="4" fill="#B3E5FC"/>
    <text x="629" y="228" text-anchor="middle" font-size="8" fill="#0277BD" font-weight="bold">기포기1</text>
  </g>
  <!-- 기포기2 (기포기1에서 직렬, 좌측) -->
  <g filter="url(#sh)">
    <rect x="300" y="212" width="50" height="26" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="1.4"/>
    <circle cx="315" cy="225" r="8" fill="white" stroke="#0288D1" stroke-width="1"/>
    <circle cx="315" cy="225" r="4" fill="#B3E5FC"/>
    <text x="334" y="228" text-anchor="middle" font-size="8" fill="#0277BD" font-weight="bold">기포기2</text>
  </g>

  <!-- 위즈 탱크 콩돌 (air stone) — 기포기1 폭기 -->
  <ellipse cx="575" cy="408" rx="14" ry="5" fill="#B0BEC5" stroke="#607D8B" stroke-width="0.8"/>
  <circle cx="571" cy="398" r="2.4" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="577" cy="391" r="2" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="582" cy="385" r="1.6" fill="#4FC3F7" opacity="0.5"/>
  <text x="575" y="426" text-anchor="middle" font-size="7" fill="#546E7A">콩돌</text>

  <!-- pH 비이커 콩돌 (air stone) — 기포기2 폭기 -->
  <ellipse cx="445" cy="362" rx="11" ry="4" fill="#B0BEC5" stroke="#607D8B" stroke-width="0.8"/>
  <circle cx="441" cy="353" r="2.2" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="448" cy="347" r="1.8" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="452" cy="351" r="1.5" fill="#4FC3F7" opacity="0.5"/>
  <text x="466" y="366" font-size="7" fill="#546E7A">콩돌</text>

  <!-- ===== 펌프 ===== -->
  <g filter="url(#sh)">
    <rect x="260" y="55" width="216" height="58" rx="6" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
    <g>
      <rect x="270" y="63" width="42" height="42" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <circle cx="291" cy="84" r="11" fill="#CFD8DC" stroke="#607D8B" stroke-width="1"/>
      <circle cx="291" cy="84" r="4" fill="#455A64"/>
      <text x="291" y="108" text-anchor="middle" font-size="7" fill="#1565C0" font-weight="bold">M1</text>
    </g>
    <g>
      <rect x="320" y="63" width="42" height="42" rx="3" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
      <circle cx="341" cy="84" r="11" fill="#CFD8DC" stroke="#607D8B" stroke-width="1"/>
      <circle cx="341" cy="84" r="4" fill="#455A64"/>
      <text x="341" y="108" text-anchor="middle" font-size="7" fill="#C62828" font-weight="bold">M2</text>
    </g>
    <g>
      <rect x="370" y="63" width="42" height="42" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
      <circle cx="391" cy="84" r="11" fill="#CFD8DC" stroke="#607D8B" stroke-width="1"/>
      <circle cx="391" cy="84" r="4" fill="#455A64"/>
      <text x="391" y="108" text-anchor="middle" font-size="7" fill="#E65100" font-weight="bold">M3</text>
    </g>
    <g>
      <rect x="420" y="63" width="42" height="42" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
      <circle cx="441" cy="84" r="11" fill="#CFD8DC" stroke="#607D8B" stroke-width="1"/>
      <circle cx="441" cy="84" r="4" fill="#455A64"/>
      <text x="441" y="108" text-anchor="middle" font-size="7" fill="#2E7D32" font-weight="bold">M4</text>
    </g>
  </g>
  <text x="367" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#546E7A">펌프</text>

  <!-- ===== 제어기 ===== -->
  <g filter="url(#sh)">
    <rect x="730" y="200" width="180" height="175" rx="6" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
    <rect x="745" y="215" width="65" height="24" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
    <text x="777" y="231" text-anchor="middle" font-size="7" fill="#795548">브레드보드</text>
    <rect x="818" y="215" width="65" height="24" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
    <text x="850" y="231" text-anchor="middle" font-size="7" fill="#795548">브레드보드</text>
    <rect x="745" y="248" width="30" height="18" rx="1" fill="#4CAF50"/>
    <text x="760" y="260" text-anchor="middle" font-size="6" fill="white" font-weight="bold">Nano</text>
    <rect x="780" y="248" width="24" height="18" rx="1" fill="#2196F3"/>
    <text x="792" y="260" text-anchor="middle" font-size="6" fill="white" font-weight="bold">ADS</text>
    <rect x="809" y="248" width="24" height="18" rx="1" fill="#9C27B0"/>
    <text x="821" y="260" text-anchor="middle" font-size="6" fill="white" font-weight="bold">BT</text>
    <rect x="745" y="276" width="38" height="18" rx="1" fill="#F44336"/>
    <text x="764" y="288" text-anchor="middle" font-size="6" fill="white">L298N</text>
    <rect x="788" y="276" width="38" height="18" rx="1" fill="#F44336"/>
    <text x="807" y="288" text-anchor="middle" font-size="6" fill="white">L298N</text>
    <rect x="831" y="276" width="38" height="18" rx="1" fill="#F44336"/>
    <text x="850" y="288" text-anchor="middle" font-size="6" fill="white">L298N</text>
    <rect x="745" y="303" width="52" height="12" rx="1" fill="#FF9800"/>
    <text x="771" y="312" text-anchor="middle" font-size="6" fill="white">5V Buck</text>
    <rect x="802" y="303" width="65" height="12" rx="1" fill="#FF9800"/>
    <text x="834" y="312" text-anchor="middle" font-size="6" fill="white">6V XL4015</text>
    <circle cx="745" cy="340" r="3" fill="#4CAF50"/>
    <text x="755" y="343" font-size="6" fill="#666">PWR</text>
    <circle cx="905" cy="260" r="6" fill="#333" stroke="#111" stroke-width="1"/>
    <text x="905" y="278" text-anchor="middle" font-size="6" fill="#333">DC12V</text>
  </g>
  <text x="820" y="193" text-anchor="middle" font-size="11" font-weight="bold" fill="#546E7A">제어기</text>

  <!-- (기포기는 헤드스페이스 박스 내부로 이동) -->

  <!-- ===== DC 어댑터 ===== -->
  <g filter="url(#sh)">
    <rect x="830" y="450" width="75" height="40" rx="5" fill="#333"/>
    <text x="867" y="475" text-anchor="middle" font-size="9" fill="white" font-weight="bold">12V 3A</text>
    <path d="M905,470 L935,470 Q945,470 945,455 L945,410 L905,410 L905,266" fill="none" stroke="#333" stroke-width="2"/>
  </g>
  <text x="867" y="445" text-anchor="middle" font-size="8" fill="#333">DC 어댑터</text>

  <!-- ===== 호스 연결 ===== -->

  <!-- 수조 → M1 -->
  <path d="M195,310 Q230,310 230,200 Q230,84 268,84" fill="none" stroke="#1565C0" stroke-width="2.5" opacity="0.7"/>
  <!-- M1 → 수조물 비이커 -->
  <path d="M291,113 L291,160 Q291,180 320,180 L355,180 L355,255" fill="none" stroke="#1565C0" stroke-width="2.5" opacity="0.7"/>

  <!-- M2: 수조물 비이커 ↔ pH 비이커 -->
  <path d="M341,113 L341,165 Q341,175 360,175 L460,175 L460,255" fill="none" stroke="#C62828" stroke-width="2" opacity="0.7"/>

  <!-- M3: KCL ↔ pH 비이커 -->
  <path d="M391,113 L391,170 Q391,185 420,185 L460,185 L460,255" fill="none" stroke="#E65100" stroke-width="2" opacity="0.7"/>

  <!-- M4: 위즈탱크(참조수) ↔ pH 비이커 -->
  <path d="M441,113 L441,168 Q441,178 455,178 L460,178 L460,255" fill="none" stroke="#2E7D32" stroke-width="2" opacity="0.7"/>

  <!-- ===== 기포기 제어선 (직렬: 제어기 → 기포기1 → 기포기2) ===== -->
  <!-- 제어기 → 기포기1 -->
  <path d="M730,228 C702,228 672,226 646,225" fill="none" stroke="#37474F" stroke-width="1.6" stroke-dasharray="6,3"/>
  <!-- 기포기1 → 기포기2 (직렬) -->
  <path d="M596,224 L596,206 L350,206 L350,224" fill="none" stroke="#37474F" stroke-width="1.6" stroke-dasharray="6,3"/>

  <!-- ===== 에어라인 (기포기 → 콩돌) ===== -->
  <!-- 기포기1 → 위즈 탱크 콩돌 -->
  <path d="M621,238 L621,402 Q621,408 614,408 L589,408" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- 기포기2 → pH 비이커 콩돌 -->
  <path d="M325,238 L325,247 Q325,251 333,251 L445,251 L445,358" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 제어기 → 펌프 (전선) -->
  <path d="M730,250 Q700,250 700,150 Q700,80 478,80" fill="none" stroke="#455A64" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- 제어기 → 온도센서 -->
  <path d="M730,310 Q710,310 710,305 L630,305 L628,305" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- 제어기 → pH 프로브 -->
  <path d="M730,280 Q705,280 705,275 L500,275 L495,275" fill="none" stroke="#607D8B" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- BT 신호 -->
  <path d="M821,248 Q835,235 845,240" fill="none" stroke="#9C27B0" stroke-width="1" opacity="0.4"/>
  <text x="852" y="237" font-size="6" fill="#9C27B0">BT</text>

  <!-- ===== 범례 ===== -->
  <rect x="25" y="540" width="340" height="148" rx="6" fill="white" stroke="#CCC" stroke-width="1" opacity="0.9"/>
  <text x="195" y="562" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">범례</text>

  <line x1="42" y1="578" x2="68" y2="578" stroke="#1565C0" stroke-width="2.5" opacity="0.7"/>
  <text x="75" y="582" font-size="8" fill="#555">M1: 수조 ↔ 수조물 비이커 (샘플링/반환)</text>
  <line x1="42" y1="596" x2="68" y2="596" stroke="#C62828" stroke-width="2" opacity="0.7"/>
  <text x="75" y="600" font-size="8" fill="#555">M2: 수조물 비이커 ↔ pH 비이커 (측정 이송)</text>
  <line x1="42" y1="614" x2="68" y2="614" stroke="#E65100" stroke-width="2" opacity="0.7"/>
  <text x="75" y="618" font-size="8" fill="#555">M3: KCL ↔ pH 비이커 (프로브 보관)</text>
  <line x1="42" y1="632" x2="68" y2="632" stroke="#2E7D32" stroke-width="2" opacity="0.7"/>
  <text x="75" y="636" font-size="8" fill="#555">M4: 위즈 탱크(참조수) ↔ pH 비이커</text>
  <line x1="42" y1="650" x2="68" y2="650" stroke="#37474F" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="75" y="654" font-size="8" fill="#555">기포기 제어선 (제어기→기포기1→기포기2 직렬, D12 ron)</text>
  <line x1="42" y1="668" x2="68" y2="668" stroke="#4FC3F7" stroke-width="1.8" stroke-dasharray="4,2"/>
  <text x="75" y="672" font-size="8" fill="#555">에어라인 → 콩돌 (기포기1=위즈 탱크, 기포기2=pH 비이커)</text>

  <!-- 공식 -->
  <rect x="410" y="545" width="340" height="80" rx="6" fill="#263238" opacity="0.95"/>
  <text x="580" y="570" text-anchor="middle" font-size="12" fill="#80CBC4" font-weight="bold" font-family="monospace">KH_tank = KH_ref × 10^(-ΔpH)</text>
  <text x="580" y="592" text-anchor="middle" font-size="10" fill="#B2DFDB" font-family="monospace">ΔpH = pH_ref − pH_tank</text>
  <text x="580" y="614" text-anchor="middle" font-size="8" fill="#78909C">탈기 후 CO₂ 평형 → pH 차이 = 순수 알칼리니티 차이</text>

  <!-- 정확도 뱃지 -->
  <rect x="790" y="545" width="260" height="80" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="920" y="568" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">측정 정확도</text>
  <text x="920" y="588" text-anchor="middle" font-size="10" fill="#333">분해능 ±0.001 dKH</text>
  <text x="920" y="605" text-anchor="middle" font-size="10" fill="#333">정확도 ±0.07 dKH (±1.2%)</text>
  <text x="920" y="620" text-anchor="middle" font-size="8" fill="#666">Nernst 보정 오차 0% (15~35°C)</text>
</svg>
